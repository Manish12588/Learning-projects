version: '3.9'

services:

  mongo:
    image: mongo:7
    container_name: calorie-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: calorie-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/calorieapp
      PORT: 3000
    depends_on:
      - mongo
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: calorie-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  mongo-data:

networks:
  app-net:
    driver: bridge
